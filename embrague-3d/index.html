<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#131722">
  <title>El Embrague — Mini-juego 3D · Tesos Academy</title>
  <!-- Favicon inline (emoji) para evitar peticiones externas y 404 de favicon. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
  <!-- Tipografía: pila de fuentes del sistema (sin CDN) para funcionar offline. -->
  <link rel="stylesheet" href="css/game.css">

  <!-- Three.js vendorizado localmente (r160, build ESM minificado) para que el
       sandbox sea 100% autónomo y offline. Los modelos de la Fase 1 son
       geometrías nativas, sin assets externos. Para actualizar la librería
       basta reemplazar vendor/three.module.js. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js"
    }
  }
  </script>
</head>
<body>
  <!-- ================= Pantalla de inicio (selector carro/moto) ============ -->
  <section id="start-screen" class="overlay start">
    <div class="overlay-card">
      <div class="brand">🚗🏍️</div>
      <h1>El Embrague</h1>
      <p class="lede">Aprende, jugando, cómo funciona el embrague y la caja de
        cambios. Encuentra el punto de contacto, entiende las marchas y arranca
        sin calar el motor.</p>

      <div class="vehicle-toggle" role="group" aria-label="Tipo de vehículo">
        <button data-vehicle="car" class="vt-btn">
          <span class="vt-emoji">🚗</span><span>Carro</span>
          <small>pedal de embrague</small>
        </button>
        <button data-vehicle="motorcycle" class="vt-btn">
          <span class="vt-emoji">🏍️</span><span>Moto</span>
          <small>maneta de embrague</small>
        </button>
      </div>

      <button id="btn-start" class="action-btn primary big">Empezar</button>
      <button id="btn-leaderboard-start" class="action-btn ghost">Ver clasificación</button>
      <p class="hint">3 niveles · mobile-first · puntúa y compite</p>
    </div>
  </section>

  <!-- ========================= Juego ====================================== -->
  <main id="game" class="hidden">
    <header id="topbar">
      <div id="level-progress" class="pill">Nivel 1/3</div>
      <div class="user-chip">👤 <span id="hud-user">Invitado</span></div>
    </header>

    <!-- Canvas 3D (parte superior, la UI no lo tapa) -->
    <div id="canvas-wrap"></div>

    <!-- HUD: tacómetro, velocidad, marcha, fuerza -->
    <div id="hud">
      <div class="gauge rpm">
        <div class="g-head"><span>RPM</span><b id="rpm-val">800</b></div>
        <div class="bar"><i id="rpm-bar"></i></div>
      </div>
      <div class="gauge force">
        <div class="g-head"><span>Fuerza a ruedas</span></div>
        <div class="bar force"><i id="force-bar"></i></div>
      </div>
      <div class="mini">
        <div class="mini-box"><span>Vel</span><b id="speed-val">0</b></div>
        <div class="mini-box gear"><span>Marcha</span><b id="gear-val">N</b></div>
      </div>
    </div>

    <!-- Panel de microcopy pedagógico -->
    <div id="microcopy" class="panel"></div>

    <!-- Zona de controles (thumb-friendly, abajo) -->
    <div id="controls"></div>
  </main>

  <!-- Overlays de resultado y clasificación -->
  <section id="level-overlay" class="overlay hidden"></section>
  <section id="leaderboard-overlay" class="overlay hidden"></section>

  <script type="module" src="src/game.js"></script>
</body>
</html>
